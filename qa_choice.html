<!DOCTYPE html>
<!--
  qa_choice.html — diálogo GENÉRICO de choice (botones) del form asistido (contrato chat 61).
  Data-driven: el host llama window.renderChoice(marker) con {menu, prompt, options[], default, body, payload}.
  Un botón por option; al click → window.qaFormAnswer({menu, action:'choose', value:key}).
  Si marker.payload.seeds existe (reuse_seeds) → panel de TARJETAS (título + badge de nicho), sin dump monospace.
  Paleta EXACTA copiada de qa_seed_pick.html (Claude Design) — NO inventar colores.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elegí una opción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f0f12; color: #e8e8ec; font-family: 'Space Grotesk', sans-serif; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 54px 24px 60px; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .2em; color: #5e5e68; }
  .prompt { font-size: 26px; font-weight: 600; color: #f4f4f6; margin: 12px 0 0; letter-spacing: -.01em; }
  .body { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.7; color: #8a8a92;
          white-space: pre-wrap; background: #16161b; border: 1px solid #262630; border-radius: 10px;
          padding: 14px 16px; margin-top: 18px; }
  /* Panel de tarjetas de seeds (aterrizaje reuse_seeds) */
  .seeds { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
  .seeds-cap { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .14em;
               color: #5e5e68; margin-bottom: 2px; }
  .seed { display: flex; align-items: center; justify-content: space-between; gap: 14px;
          background: #16161b; border: 1px solid #262630; border-radius: 12px; padding: 15px 18px; }
  .seed .ttl { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
               color: #f4f4f6; letter-spacing: -.01em; line-height: 1.3; }
  .seed .badge { flex: none; display: inline-flex; align-items: center; gap: 6px;
                 font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
                 letter-spacing: .03em; color: #b6b6be; background: #222229;
                 border: 1px solid #34343c; border-radius: 999px; padding: 5px 11px; white-space: nowrap; }
  .opts { display: flex; flex-direction: column; gap: 12px; margin-top: 26px; }
  .opt { display: flex; align-items: center; gap: 14px; text-align: left; cursor: pointer; width: 100%;
         background: #222229; border: 1px solid #34343c; border-radius: 12px; padding: 16px 18px;
         color: #e8e8ec; font-family: 'Space Grotesk', sans-serif; transition: background .12s, border-color .12s, transform .08s; }
  .opt:hover { border-color: #2ea043; background: #1d1d24; }
  .opt:active { transform: scale(.992); }
  .opt .key { flex: none; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center;
              justify-content: center; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
              background: #0f0f12; border: 1px solid #34343c; color: #b6b6be; }
  .opt .lab { font-size: 15.5px; font-weight: 500; color: #f0f0f3; }
  .opt.primary { background: #2ea043; border-color: #2ea043; color: #06140a; box-shadow: 0 8px 26px rgba(46,160,67,.35); }
  .opt.primary .key { background: rgba(6,20,10,.18); border-color: rgba(6,20,10,.25); color: #06140a; }
  .opt.primary .lab { color: #06140a; }
  .opt.primary:hover { filter: brightness(1.05); }
  .opt.disabled { opacity: .42; cursor: not-allowed; }
  .opt.disabled:hover { border-color: #34343c; background: #222229; }
  .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5e5e68; margin-top: 22px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow" id="eyebrow">ELEGÍ UNA OPCIÓN</div>
    <div class="prompt" id="prompt">…</div>
    <div class="body" id="body" style="display:none"></div>
    <div class="seeds" id="seeds" style="display:none"></div>
    <div class="opts" id="opts"></div>
    <div class="hint">Click en una opción, o apretá su tecla. El default va resaltado en verde.</div>
  </div>

<script>
(function () {
  'use strict';
  var MENU = '';
  var KEYMAP = {};   // tecla (lower) → key real, para los botones no deshabilitados

  function qaAnswer(p) {
    try { if (typeof window.qaFormAnswer === 'function') window.qaFormAnswer(p); }
    catch (e) { /* no romper si el host falla */ }
  }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function choose(key) { qaAnswer({ menu: MENU, action: 'choose', value: key }); }

  // Mapeo de badge de nicho por mode del seed (emoji + label lindo).
  var MODE_BADGES = {
    spy_arbitrage:       { emoji: '🕵️', label: 'Spy-Arbitrage' },
    digital_archaeology: { emoji: '🏛️', label: 'Arqueología' },
    manual:              { emoji: '✏️', label: 'Manual' }
  };
  function badgeFor(mode) {
    var m = MODE_BADGES[mode];
    if (m) return '<span class="badge">' + m.emoji + ' ' + esc(m.label) + '</span>';
    var raw = (mode == null || mode === '') ? '—' : mode;
    return '<span class="badge">' + esc(raw) + '</span>';
  }

  // Renderiza el panel de tarjetas de seeds (aterrizaje reuse_seeds).
  function renderSeeds(seeds) {
    var box = document.getElementById('seeds');
    box.innerHTML = '';
    var cap = document.createElement('div');
    cap.className = 'seeds-cap';
    cap.textContent = 'SEEDS ENCONTRADOS · ' + seeds.length;
    box.appendChild(cap);
    seeds.forEach(function (s) {
      s = s || {};
      var card = document.createElement('div');
      card.className = 'seed';
      card.innerHTML = '<span class="ttl">' + esc(s.title) + '</span>' + badgeFor(s.mode);
      box.appendChild(card);
    });
    box.style.display = 'flex';
  }

  function renderChoice(marker) {
    marker = marker || {};
    MENU = marker.menu || '';
    KEYMAP = {};
    document.getElementById('prompt').textContent = marker.prompt || 'Elegí una opción';
    var bodyEl = document.getElementById('body');
    var seedsEl = document.getElementById('seeds');
    var payload = marker.payload || {};
    var seeds = Array.isArray(payload.seeds) ? payload.seeds : null;

    if (seeds) {
      // Con payload de seeds: tarjetas en vez del dump monospace.
      bodyEl.style.display = 'none';
      renderSeeds(seeds);
    } else {
      seedsEl.style.display = 'none';
      seedsEl.innerHTML = '';
      if (marker.body) { bodyEl.textContent = marker.body; bodyEl.style.display = 'block'; }
      else { bodyEl.style.display = 'none'; }
    }

    var opts = document.getElementById('opts');
    opts.innerHTML = '';
    (marker.options || []).forEach(function (o) {
      var isDef = marker.default != null && o.key === marker.default;
      var disabled = !!o.disabled;
      var b = document.createElement('button');
      b.className = 'opt' + (isDef && !disabled ? ' primary' : '') + (disabled ? ' disabled' : '');
      b.innerHTML = '<span class="key">' + esc(o.key) + '</span><span class="lab">' + esc(o.label) + '</span>';
      if (disabled) { b.disabled = true; }
      else {
        KEYMAP[String(o.key).toLowerCase()] = o.key;
        b.addEventListener('click', function () { choose(o.key); });
      }
      opts.appendChild(b);
    });
  }

  // Atajo de teclado: apretar la letra de una opción habilitada la elige.
  document.addEventListener('keydown', function (e) {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    var k = (e.key || '').toLowerCase();
    if (KEYMAP.hasOwnProperty(k)) { e.preventDefault(); choose(KEYMAP[k]); }
  });

  window.renderChoice = renderChoice;
})();
</script>
</body>
</html>
