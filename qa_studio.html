<!DOCTYPE html>
<!--
  qa_studio.html — QA STUDIO v1.1 · VISOR (read-only) + ENSAMBLAR.
  Servido por qa_studio_server.py. Reimplementación en HTML/JS PLANO del mockup de
  Claude Design (Estudio_QA_dc_2). La estética (paleta, glows, tipografías, timeline
  segmentada por heat, tarjetas) viene del adjunto AL PIE DE LA LETRA. Sin librerías.

  v1.1:
   - estética Design (#7c5cff/#22d3ee/#2dd4bf/#f5a524/#f0506b, gradiente brand, ambient glows).
   - MEJORA 1: botón fijo bajo el preview "▶ Reproducir audio de esta imagen" → playSeg(activeIdx).
     Si la imagen activa es el clip (caps veo) → "▶ Reproducir clip de video" (reproduce el <video>).
   - cap 7 (veo_position=end) llega como modelo timeline desde el server (segmento is_clip final).
   - Botones de fix VISIBLES pero DESHABILITADOS (tooltip v2). ENSAMBLAR cableado.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estudio QA — revisión por capítulo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── HEAT THRESHOLDS (perilla; afinar con videos reales — NO hardcodear repartido) ── */
  :root{
    --heat-good-max:8;   /* seg → teal */
    --heat-long-max:13;  /* seg → ámbar; > → rojo */
    color-scheme:dark;
    --bg:#08080c; --ink:#e9e9f1; --ink2:#f3f3fa; --dim:#9595a4; --dim2:#76768a; --faint:#6b6b80;
    --violet:#7c5cff; --cyan:#22d3ee; --teal:#2dd4bf; --amber:#f5a524; --red:#f0506b;
    --grad:linear-gradient(135deg,#7c5cff 0%,#22d3ee 100%);
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --display:'Space Grotesk',system-ui,sans-serif;
    --serif:'Spectral',Georgia,serif;
  }
  *{box-sizing:border-box;}
  ::selection{background:rgba(124,92,255,.4);}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--display);min-height:100vh;overflow-x:hidden;}
  @keyframes phGlow{0%,100%{opacity:1}50%{opacity:.6}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .glow{position:fixed;border-radius:50%;filter:blur(20px);pointer-events:none;z-index:0;}
  .g1{top:-220px;left:-160px;width:620px;height:620px;background:radial-gradient(circle,rgba(124,92,255,.16),transparent 65%);}
  .g2{top:-160px;right:-160px;width:560px;height:560px;background:radial-gradient(circle,rgba(34,211,238,.13),transparent 65%);}
  .wrap{position:relative;z-index:1;max-width:1340px;margin:0 auto;padding:26px 34px 90px;}

  /* ── top bar ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:26px;flex-wrap:wrap;
    padding:16px 20px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(14px);}
  .brand{display:flex;align-items:center;gap:18px;min-width:0;}
  .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);box-shadow:0 6px 20px rgba(124,92,255,.45);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:#0a0a12;font-size:15px;}
  .brand-name{font-weight:700;font-size:15px;letter-spacing:.16em;color:var(--ink2);}
  .vdiv{width:1px;height:30px;background:rgba(255,255,255,.1);}
  .ttl{font-weight:600;font-size:16px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46vw;}
  .tid{flex:none;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:#b9a7ff;background:rgba(124,92,255,.14);
    border:1px solid rgba(124,92,255,.34);padding:3px 8px;border-radius:6px;}
  .sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:6px;}
  .asm-side{display:flex;align-items:center;gap:14px;}
  .asm-sub{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--dim2);text-align:right;}
  .btn-assemble{display:flex;align-items:center;font-weight:700;font-size:14px;letter-spacing:.04em;white-space:nowrap;
    color:#0a0a12;background:var(--grad);padding:13px 26px;border-radius:13px;cursor:pointer;border:none;
    box-shadow:0 10px 34px rgba(124,92,255,.5);transition:transform .12s,filter .12s;font-family:var(--display);}
  .btn-assemble:hover:not(:disabled){filter:brightness(1.07);} .btn-assemble:active{transform:scale(.98);}
  .btn-assemble:disabled{opacity:.55;cursor:wait;}

  /* ── rail ── */
  .rail{display:flex;gap:11px;margin-top:20px;overflow-x:auto;padding-bottom:4px;}
  .pill{flex:0 0 138px;cursor:pointer;padding:14px 16px;border-radius:16px;transition:all .18s;
    background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);}
  .pill:hover{border-color:rgba(255,255,255,.18);}
  .pill.active{background:linear-gradient(135deg,rgba(124,92,255,.22),rgba(34,211,238,.16));
    border:1px solid rgba(124,92,255,.55);box-shadow:0 10px 30px rgba(124,92,255,.28);}
  .pill .top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .pill .num{font-weight:700;font-size:24px;line-height:1;color:#cfcfda;}
  .pill.active .num{color:#f6f6fc;}
  .pill .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);}
  .pill.active .dot{background:var(--grad);box-shadow:0 0 10px rgba(124,92,255,.8);}
  .pill .role{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;margin-top:10px;}
  .pill .cnt{font-size:11px;margin-top:3px;color:#82828f;}
  .pill.active .cnt{color:#c8c8d6;}

  /* ── chapter header + timeline ── */
  .chcard{margin-top:20px;padding:24px 26px 26px;border-radius:20px;background:rgba(255,255,255,.035);
    border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(14px);}
  .chhead{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .chrole{font-family:var(--mono);font-size:11px;letter-spacing:.14em;}
  .chtitle{font-weight:600;font-size:26px;color:#f4f4fb;margin-top:8px;letter-spacing:-.01em;text-transform:capitalize;}
  .chmeta{display:flex;gap:18px;margin-top:9px;font-family:var(--mono);font-size:12px;color:var(--dim);}
  .chctrls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end;}
  .readout{font-family:var(--mono);font-size:13px;color:#c9c9d6;} .readout b{color:var(--cyan);font-weight:600;}
  .btn{font-family:var(--display);cursor:pointer;border-radius:12px;border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);color:#f3f3fa;padding:11px 20px;font-size:14px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:8px;}
  .btn:hover:not(:disabled){border-color:rgba(255,255,255,.22);}
  .btn.on{background:rgba(124,92,255,.28);border-color:rgba(124,92,255,.55);}
  .btn.amberish{color:#e3b06a;background:rgba(245,165,36,.08);border-color:rgba(245,165,36,.3);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .tl{position:relative;height:74px;margin-top:26px;}
  .tlrow{display:flex;gap:4px;height:100%;}
  .seg{position:relative;border-radius:8px;cursor:pointer;overflow:hidden;transition:flex-basis .55s ease,background .3s,box-shadow .15s;
    border-top:2px solid transparent;}
  .seg .sn{position:absolute;top:5px;left:7px;font-family:var(--mono);font-size:9px;font-weight:700;color:rgba(255,255,255,.45);}
  .seg.active .sn{color:#f4f4fb;}
  .seg .clipmark{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;pointer-events:none;}
  .seg .clipmark span:first-child{font-size:13px;line-height:1;color:#cfeeff;}
  .seg .clipmark .cl{font-family:var(--mono);font-size:7.5px;letter-spacing:.14em;color:#cfeeff;}
  .playhead{position:absolute;top:-9px;bottom:-9px;width:2px;transform:translateX(-1px);background:var(--grad);
    box-shadow:0 0 14px rgba(124,92,255,.85),0 0 22px rgba(34,211,238,.5);border-radius:2px;pointer-events:none;z-index:6;display:none;}
  .playhead .knob{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 12px rgba(34,211,238,.9);animation:phGlow 1.2s ease-in-out infinite;}
  .hover-tip{position:absolute;bottom:calc(100% + 16px);transform:translateX(-50%);z-index:9;pointer-events:none;display:none;}
  .hover-tip .box{padding:9px;border-radius:14px;background:rgba(16,16,24,.97);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.6);}
  .hover-tip .thumb{width:78px;height:138px;border-radius:8px;object-fit:cover;background:#101017;display:block;}
  .hover-tip .ha{max-width:180px;margin-top:8px;font-family:var(--serif);font-size:12.5px;line-height:1.4;color:#e4e4ee;}
  .hover-tip .ht{display:flex;align-items:center;gap:7px;margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--dim);}
  .tllegend{display:flex;align-items:center;justify-content:space-between;margin-top:11px;font-family:var(--mono);font-size:10px;color:var(--faint);}
  .tllegend .mid{display:flex;gap:16px;color:var(--dim2);}
  .tllegend .lg{display:flex;align-items:center;gap:6px;} .tllegend .sw{width:8px;height:8px;border-radius:3px;}
  .badge-sync{font-family:var(--mono);font-size:10px;color:var(--amber);background:rgba(245,165,36,.16);
    border:1px solid rgba(245,165,36,.4);padding:3px 8px;border-radius:7px;}

  /* ── photo area ── */
  .area{margin-top:22px;display:flex;gap:18px;align-items:flex-start;}
  .preview{flex:0 0 250px;position:sticky;top:18px;align-self:flex-start;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:14px;backdrop-filter:blur(14px);}
  .preview .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
  .preview .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:#9aa0c8;}
  .preview .idx{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink);background:rgba(124,92,255,.18);
    border:1px solid rgba(124,92,255,.42);padding:2px 8px;border-radius:6px;}
  .pv-media{position:relative;width:100%;border-radius:14px;overflow:hidden;box-shadow:0 14px 40px rgba(0,0,0,.45);background:#101017;}
  .pv-media img,.pv-media video{width:100%;display:block;background:#05060a;}
  .pv-media .corner{position:absolute;top:0;left:0;width:100%;height:4px;}
  .btn-img{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:12px;font-weight:600;font-size:13px;
    color:#0a0a12;background:var(--grad);padding:11px 14px;border-radius:11px;cursor:pointer;border:none;font-family:var(--display);
    box-shadow:0 8px 24px rgba(124,92,255,.4);transition:transform .12s;}
  .btn-img:active{transform:scale(.97);}
  .pv-anchor{margin-top:12px;font-family:var(--serif);font-size:14px;line-height:1.46;color:#e7e7f0;}
  .pv-heat{display:flex;align-items:center;gap:7px;margin-top:10px;}
  .heatdot{width:8px;height:8px;border-radius:50%;}
  .pv-time{font-family:var(--mono);font-size:10.5px;color:var(--dim);}
  .pv-hl{font-family:var(--mono);font-size:10px;}

  .grid-wrap{flex:1;min-width:0;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:18px;align-items:start;}
  .pcard{display:flex;flex-direction:column;background:rgba(255,255,255,.035);border-radius:16px;overflow:hidden;
    transition:transform .2s,box-shadow .2s,opacity .2s,border-color .2s;border:1px solid rgba(255,255,255,.08);}
  .pcard.clip{grid-column:1/-1;}
  .pcard.active{transform:scale(1.045);box-shadow:0 0 0 1.5px rgba(124,92,255,.6),0 18px 55px rgba(124,92,255,.34);
    border-color:rgba(124,92,255,.6);position:relative;z-index:3;}
  .pcard.dim{opacity:.4;filter:saturate(.7);}
  .pcard .pimg{position:relative;width:100%;cursor:pointer;background:#101017;}
  .pcard .pimg img,.pcard .pimg video{width:100%;display:block;}
  .pcard .pidx{position:absolute;top:9px;left:10px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink);
    background:rgba(8,8,14,.6);backdrop-filter:blur(4px);padding:2px 7px;border-radius:6px;z-index:2;}
  .pcard .corner{position:absolute;top:0;right:0;width:100%;height:4px;}
  .pcard .ov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;border:1px solid rgba(255,255,255,.22);
    backdrop-filter:blur(4px);transition:all .15s;z-index:2;}
  .pcard .body{padding:13px 14px 12px;}
  .pcard .anchor{font-family:var(--serif);font-size:14.5px;line-height:1.42;color:#e7e7f0;min-height:62px;}
  .pcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.07);}
  .pcard .heat{display:flex;align-items:center;gap:7px;}
  .fixlink{font-family:var(--mono);font-size:10.5px;color:#6f6f84;cursor:not-allowed;}
  .clipbadge{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:#7fd6f5;}

  /* ── Option A (veo start) ── */
  .single-wrap{max-width:880px;margin:0 auto;}
  .single-card{background:rgba(255,255,255,.035);border:1px solid rgba(124,92,255,.3);border-radius:20px;overflow:hidden;}
  .single-card video,.single-card img{width:100%;display:block;background:#05060a;}
  .single-body{padding:20px 24px 22px;}
  .single-anchor{font-family:var(--serif);font-size:21px;font-style:italic;line-height:1.45;color:#f0f0f7;max-width:640px;}
  .galtitle{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#9aa0c8;margin:22px 0 12px;}
  .gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .galitem{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;}
  .galitem:hover{border-color:rgba(124,92,255,.4);}
  .galitem.sel{border-color:rgba(34,211,238,.5);box-shadow:0 0 0 1px rgba(34,211,238,.4);}
  .galitem img{width:100%;aspect-ratio:9/16;object-fit:cover;display:block;}
  .galitem .gc{font-family:var(--mono);font-size:9.5px;color:var(--dim);padding:7px 9px;line-height:1.4;}

  .fixbar{display:flex;gap:9px;margin-top:22px;flex-wrap:wrap;align-items:center;}
  .fixbar .hint{font-family:var(--mono);font-size:10.5px;color:var(--faint);}

  /* ── fix panel inline por tarjeta (Zona 1) ── */
  .fixlink.on{color:#2dd4bf;cursor:pointer;}
  .fixpanel{padding:0 14px 14px;animation:slideDown .22s ease;}
  .fixpanel .top{border-top:1px solid rgba(45,212,191,.18);padding-top:12px;}
  .fixpanel .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;
    letter-spacing:.05em;color:#2dd4bf;background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.3);padding:3px 8px;border-radius:6px;}
  .fixpanel .tag .d{width:6px;height:6px;border-radius:50%;background:#2dd4bf;box-shadow:0 0 6px #2dd4bf;}
  .fixpanel textarea{margin-top:10px;width:100%;height:60px;resize:vertical;background:rgba(8,8,14,.5);
    border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 11px;color:var(--ink);
    font-family:var(--display);font-size:12.5px;line-height:1.4;outline:none;}
  .fixpanel textarea:focus{border-color:rgba(45,212,191,.5);}
  .fixpanel .row{display:flex;align-items:center;gap:9px;margin-top:9px;flex-wrap:wrap;}
  .btn-regen{display:flex;align-items:center;gap:7px;font-family:var(--display);font-weight:600;font-size:12px;
    background:var(--grad);color:#0a0a12;padding:8px 14px;border-radius:9px;cursor:pointer;border:none;
    box-shadow:0 6px 16px rgba(124,92,255,.4);}
  .btn-regen:disabled{opacity:.7;cursor:default;}
  .fixcancel{font-family:var(--display);font-size:12px;color:#8a8a98;cursor:pointer;padding:8px 4px;}
  .fixstatus{font-family:var(--mono);font-size:10.5px;margin-left:auto;}
  .fixstatus.work{color:var(--amber);} .fixstatus.ok{color:var(--teal);} .fixstatus.err{color:var(--red);}

  /* ── flash "actualizada" sobre la tarjeta regenerada (ÍTEM 2) ── */
  .pimg .flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(45,212,191,.20);color:#0a0a12;font-family:var(--mono);font-size:12px;font-weight:700;
    letter-spacing:.08em;z-index:6;animation:slideDown .2s ease;}
  .pimg .flash span{background:#2dd4bf;padding:5px 12px;border-radius:8px;box-shadow:0 6px 18px rgba(45,212,191,.5);}

  /* ── lightbox (ÍTEM 1: doble-click agranda) ── */
  .lightbox{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
    background:rgba(4,5,9,.92);backdrop-filter:blur(6px);cursor:zoom-out;}
  .lightbox.show{display:flex;}
  .lightbox img{max-height:94vh;max-width:94vw;aspect-ratio:9/16;object-fit:contain;border-radius:12px;
    box-shadow:0 30px 90px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);}
  .lightbox .hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-family:var(--mono);
    font-size:11px;color:var(--dim);letter-spacing:.06em;}

  /* ── assemble log + toast ── */
  .asm-log{display:none;margin-top:16px;max-height:240px;overflow:auto;background:#06080d;border:1px solid rgba(255,255,255,.1);
    border-radius:12px;padding:12px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.55;color:var(--dim);white-space:pre-wrap;}
  .asm-log.show{display:block;}
  .toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;align-items:center;gap:9px;
    font-weight:600;font-size:13px;color:#0a0a12;background:var(--grad);padding:10px 18px;border-radius:12px;
    box-shadow:0 14px 40px rgba(124,92,255,.5);animation:slideDown .25s ease;}
  .empty{color:var(--faint);font-family:var(--mono);font-size:13px;padding:40px 0;}
  .err{color:var(--red);font-family:var(--mono);font-size:12.5px;padding:20px 0;}
  .spinner{width:14px;height:14px;border:2px solid rgba(10,10,18,.35);border-top-color:#0a0a12;border-radius:50%;
    animation:spin .7s linear infinite;display:inline-block;}
</style>
</head>
<body>
<div class="glow g1"></div><div class="glow g2"></div>
<div id="toast"></div>
<div class="lightbox" id="lightbox"><img id="lightboxImg" src="" alt=""><div class="hint">click afuera o ESC para cerrar</div></div>

<div class="wrap">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="logo">Q</div><div class="brand-name">ESTUDIO QA</div>
      </div>
      <div class="vdiv"></div>
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <div class="ttl" id="topicTitle">cargando…</div>
          <div class="tid" id="topicTid"></div>
        </div>
        <div class="sub" id="capsSummary"></div>
      </div>
    </div>
    <div class="asm-side">
      <div class="asm-sub" id="asmSub">gate fase 2.5</div>
      <button class="btn-assemble" id="asmBtn"><span style="font-size:13px">▶</span>&nbsp;&nbsp;ENSAMBLAR VIDEO</button>
    </div>
  </div>
  <div class="asm-log" id="asmLog"></div>

  <!-- RAIL -->
  <div class="rail" id="rail"></div>

  <!-- VIEW -->
  <div id="view"><div class="empty">Elegí un capítulo arriba.</div></div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v);
const GOOD_MAX = parseFloat(css('--heat-good-max'));
const LONG_MAX = parseFloat(css('--heat-long-max'));
const GRAD = 'linear-gradient(135deg,#7c5cff 0%,#22d3ee 100%)';

function heat(dur){
  if(dur==null) return {solid:'#22d3ee',soft:'rgba(34,211,238,.20)',mid:'rgba(34,211,238,.5)',glow:'0 0 22px rgba(34,211,238,.6)',border:'rgba(34,211,238,.4)',label:'clip de video'};
  if(dur<=GOOD_MAX) return {solid:'#2dd4bf',soft:'rgba(45,212,191,.20)',mid:'rgba(45,212,191,.55)',glow:'0 0 20px rgba(45,212,191,.6)',border:'rgba(45,212,191,.30)',label:'duración ok'};
  if(dur<=LONG_MAX) return {solid:'#f5a524',soft:'rgba(245,165,36,.20)',mid:'rgba(245,165,36,.55)',glow:'0 0 20px rgba(245,165,36,.65)',border:'rgba(245,165,36,.34)',label:'algo largo'};
  return {solid:'#f0506b',soft:'rgba(240,80,107,.22)',mid:'rgba(240,80,107,.6)',glow:'0 0 24px rgba(240,80,107,.65)',border:'rgba(240,80,107,.40)',label:'demasiado largo'};
}
const CLIP_HEAT = {solid:'#22d3ee',soft:'linear-gradient(135deg,rgba(124,92,255,.28),rgba(34,211,238,.20))',mid:'linear-gradient(135deg,rgba(124,92,255,.62),rgba(34,211,238,.5))',glow:'0 0 22px rgba(124,92,255,.6)',border:'rgba(124,92,255,.5)',label:'clip de video'};
function fmt(s){ if(s==null||isNaN(s))return '—'; s=Math.max(0,s); return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function roleColor(r){ r=(r||'').toLowerCase();
  if(/hook|gancho/.test(r))return '#c4b5fd';
  if(/reveal|revel/.test(r))return '#f0abfc';
  if(/cierre|outro|final/.test(r))return '#fda4af';
  return '#93c5fd'; }

let CAPS=[], CUR=null, curCap=null;
const audio = new Audio();
let mode=null;            // 'all' | 'seg' | 'clip'
let activeIdx=0, previewIdx=0;
let playEnd=null;         // fin del tramo a reproducir en mode 'seg' (independiente de CUR.segments)
let FIXBUST={};           // index → timestamp para cache-bust tras un fix
let fixPoll=null;
let audioBust=0;          // cache-bust del /audio del cap tras un fix de narración

// src de la imagen del segmento i, con cache-bust si fue regenerada por un fix.
function imgSrc(i){
  const s=CUR&&CUR.segments?CUR.segments[i]:null; if(!s||!s.url) return '';
  return s.url + (FIXBUST[i]?('&t='+FIXBUST[i]):'');
}

// ── boot ──
async function boot(){
  audio.ontimeupdate=onTimeUpdate;          // motor de tramo, también para caps veo
  audio.onended=()=>{ mode=null; playEnd=null; updatePlayhead(1); refreshControls(); };
  try{ const t=await (await fetch('/topic')).json();
    $('topicTitle').textContent = t.title || 'documental';
    $('topicTid').textContent = '#'+String(t.topic_id).slice(0,8);
  }catch(e){ $('topicTitle').textContent='(topic desconocido)'; }
  try{
    CAPS = await (await fetch('/caps')).json();
    $('capsSummary').textContent = CAPS.length+' capítulos';
    renderRail();
    if(CAPS.length) selectCap(CAPS[0].cap);
  }catch(e){ $('view').innerHTML=`<div class="err">No pude cargar /caps: ${e.message}</div>`; }
}

function renderRail(){
  const rail=$('rail'); rail.innerHTML='';
  CAPS.forEach(c=>{
    const el=document.createElement('div'); el.className='pill'; el.dataset.cap=c.cap;
    const rc=roleColor(c.role);
    const cnt = c.count+(c.count===1?' foto':' fotos');
    el.innerHTML=`<div class="top"><div class="num">${c.num}</div><div class="dot"></div></div>
      <div class="role" style="color:${rc}">${esc((c.role||'').toUpperCase())}</div>
      <div class="cnt">${cnt}${c.single?' · clip':''}</div>`;
    el.onclick=()=>selectCap(c.cap);
    rail.appendChild(el);
  });
  // HANDOFF_135 — card MINIATURAS tras los caps: review server embebido (spawn a demanda).
  const tp=document.createElement('div'); tp.className='pill'; tp.dataset.cap='__thumbs__';
  tp.innerHTML=`<div class="top"><div class="num">🖼</div><div class="dot"></div></div>
    <div class="role" style="color:var(--violet)">MINIATURAS</div>
    <div class="cnt">post-assets</div>`;
  tp.onclick=()=>selectCap('__thumbs__');
  rail.appendChild(tp);
}
function markActive(cap){ document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.cap===cap)); }

async function selectCap(cap){
  // HANDOFF_135 — card MINIATURAS: no es un cap real → panel embebido, sin fetch /cap ni audio.
  if(cap==='__thumbs__'){
    stopPlayback(); curCap=cap; markActive(cap);
    if(fixPoll){ clearInterval(fixPoll); fixPoll=null; }
    renderThumbsPanel(); return;
  }
  stopPlayback(); curCap=cap; markActive(cap);
  if(fixPoll){ clearInterval(fixPoll); fixPoll=null; }
  FIXBUST={};
  $('view').innerHTML=`<div class="empty">cargando ${cap}…</div>`;
  try{
    CUR = await (await fetch('/cap?cap='+cap)).json();
    if(CUR.error) throw new Error(CUR.error);
    audio.src = CUR.audio_url + (audioBust ? '&t='+audioBust : '');  // &t= si hubo fix de narración
    activeIdx=0; previewIdx=0;
    renderTimeline(CUR);   // v1.7: TODOS los caps usan timeline (caps veo con el clip como segmento)
  }catch(e){ $('view').innerHTML=`<div class="err">error cargando ${cap}: ${e.message}</div>`; }
}

/* ════════ HANDOFF_135 — card MINIATURAS: review server de thumbnails embebido ════════ */
let thumbsPoll=null;
async function renderThumbsPanel(){
  if(thumbsPoll){ clearInterval(thumbsPoll); thumbsPoll=null; }
  const view=$('view');
  const shell=(msg)=>`<div class="chcard"><div class="chhead"><div>
      <div class="chrole" style="color:var(--violet)">MINIATURAS</div>
      <div class="chtitle">Review de thumbnails</div></div></div>
      <div style="padding:18px 2px 4px;color:var(--dim);font-family:var(--mono);font-size:12px">${msg}</div></div>`;
  view.innerHTML=shell('arrancando form de miniaturas…');
  let start;
  try{ start=await (await fetch('/thumbs_start',{method:'POST'})).json(); }
  catch(e){ view.innerHTML=shell('no pude lanzar el form: '+esc(e.message)+' — revisá la consola del server.'); return; }
  if(start.error){ view.innerHTML=shell('error: '+esc(start.error)+' — revisá la consola del server.'); return; }
  const t0=Date.now();
  thumbsPoll=setInterval(async()=>{
    if(curCap!=='__thumbs__'){ clearInterval(thumbsPoll); thumbsPoll=null; return; }  // cambió de card
    let st;
    try{ st=await (await fetch('/thumbs_status')).json(); }catch(e){ return; }
    if(st.ready && st.port){
      clearInterval(thumbsPoll); thumbsPoll=null;
      view.innerHTML=`<div class="chcard" style="padding:12px"><iframe src="http://127.0.0.1:${st.port}/"
        style="width:100%;height:78vh;border:0;border-radius:12px;background:#0b0b12"></iframe></div>`;
    }else if(Date.now()-t0>20000){
      clearInterval(thumbsPoll); thumbsPoll=null;
      view.innerHTML=shell('el form no respondió en 20s — revisá la consola del server.');
    }
  },700);
}

      card.querySelector('[data-clipfix]').onclick=()=>toggleFixPanel(i);
      card.querySelector('#fixbtn-'+i).onclick=()=>submitClipFix(c.cap, i);
    }else{

    }
    grid.appendChild(card);
  });

  $('playAll').onclick=togglePlayAll;
  const nb=$('narrFixBtn');
  if(nb){
    nb.onclick=()=>{ const p=$('narrPanel'); p.style.display=p.style.display==='none'?'block':'none';

/* ════════ shared preview / playback ════════ */
function curSeg(){ return (CUR&&CUR.segments)?CUR.segments[ (mode&&mode!=='clip')?activeIdx:previewIdx ]:null; }

function setActive(i){
  activeIdx=i; previewIdx=i;
  const segs=CUR.segments||[]; const s=segs[i]; if(!s) return;
  const isClip=!!s.is_clip; const h=isClip?CLIP_HEAT:heat(s.dur);
  // timeline highlight
  document.querySelectorAll('.seg').forEach(el=>el.classList.toggle('active',+el.dataset.i===i));
  // grid highlight + dim while playing
  document.querySelectorAll('.pcard').forEach(el=>{
    const idx=+el.dataset.i;
    el.classList.toggle('active',idx===i);
    el.classList.toggle('dim', !!mode && mode==='all' && idx!==i);
  });
  // preview media
  const m=$('pvMedia');
  if(isClip){
    m.innerHTML=`<div class="corner" style="background:#22d3ee;box-shadow:${CLIP_HEAT.glow}"></div>
      <video id="pvVideo" src="${s.clip_url||''}" controls preload="metadata" style="aspect-ratio:16/9;object-fit:cover"></video>`;
  }else{
    m.innerHTML=`<div class="corner" style="background:${h.solid};box-shadow:${h.glow}"></div>
      <img src="${imgSrc(i)}" style="aspect-ratio:9/16;object-fit:cover" alt="">`;
  }
  const photoCount=segs.filter(x=>!x.is_clip).length;
  $('pvIdx').textContent = isClip?'CLIP':(i+1)+'/'+photoCount;
  $('pvAnchor').innerHTML = s.anchor?esc(s.anchor):'<span style="color:#6f6f84;font-style:normal">(sin anchor)</span>';
  $('pvDot').style.background=h.solid; $('pvDot').style.boxShadow='0 0 7px '+h.border;
  $('pvTime').textContent = s.start!=null?fmt(s.start)+'–'+fmt(s.end)+' · '+s.dur+'s':'sin sync';
  $('pvHl').textContent='· '+h.label; $('pvHl').style.color=h.solid;
  refreshControls();
}

function refreshControls(){
  if(!CUR||!CUR.segments) return;   // Option A (sin segments) o aún sin cargar
  const s=CUR.segments[previewIdx]; if(!s){return;}
  const btn=$('pvBtn'); if(!btn) return;
  const isClip=!!s.is_clip;
  const playingThis = (mode==='seg'&&activeIdx===previewIdx) || (mode==='clip'&&activeIdx===previewIdx);
  if(isClip){
    btn.innerHTML = `<span style="font-size:12px">▶</span> Reproducir clip de video`;
  }else{
    btn.innerHTML = playingThis
      ? `<span style="font-size:13px">❚❚</span> Pausar`
      : `<span style="font-size:12px">▶</span> Reproducir audio de esta imagen`;
  }
  btn.onclick=()=>onPreviewBtn();
  // play-all button label
  const pa=$('playAll');
  if(pa) pa.innerHTML = (mode==='all')
    ? `<span style="font-size:13px">❚❚</span> Pausar capítulo`
    : `<span style="font-size:13px">▶</span> Reproducir capítulo completo`;
  if(pa) pa.classList.toggle('on', mode==='all');
}

function onPreviewBtn(){
  const s=CUR.segments[previewIdx]; if(!s) return;
  if(s.is_clip){ playClip(previewIdx); return; }
  if(mode==='seg'&&activeIdx===previewIdx){ stopPlayback(); return; }
  playSeg(previewIdx);
}

// Seek robusto: espera metadata si hace falta, seekea y RECIÉN ahí play() (evita el
// arranque desde 0 mientras el browser todavía está saltando). Requiere Range en el
// server (206) para poder saltar a `t` sin bajar todo el archivo.
function seekAndPlay(t){
  const go=()=>{
    if(Math.abs(audio.currentTime - t) < 0.06){ audio.play().catch(()=>{}); return; }
    const onSeek=()=>{ audio.play().catch(()=>{}); };
    audio.addEventListener('seeked', onSeek, {once:true});
    try{ audio.currentTime = t; }catch(e){ audio.play().catch(()=>{}); }
  };
  if(audio.readyState >= 1) go();              // HAVE_METADATA o más → seekable
  else audio.addEventListener('loadedmetadata', go, {once:true});
}

// Reproduce un tramo de narración [start,end] del cap (reusa el motor con Range).
// Independiente de CUR.segments → lo usan timeline Y caps veo (Option A).
function playAudioSpan(start, end){
  if(start==null) return false;
  mode='seg'; playEnd=(end!=null?end:null);
  seekAndPlay(start);
  return true;
}
function playSeg(i){
  const s=CUR.segments[i]; if(!s) return;
  setActive(i);
  if(s.is_clip){ playClip(i); return; }
  if(s.start==null){ return; } // foto sin sync en fallback: no reproducible por tramo
  $('playhead').style.display='block';
  refreshControls();
  playAudioSpan(s.start, s.end);
}
// Tile del clip: reproduce el <video> + la narración acotada al tramo del clip (en paralelo).
function playClip(i){
  const s=CUR.segments[i]; setActive(i);
  const v=$('pvVideo');
  if(s && s.start!=null){
    $('playhead').style.display='block';
    playAudioSpan(s.start, s.end);     // seek narración al tramo del clip
  }else{
    audio.pause(); mode='clip';        // sin sync → solo el video
  }
  if(v){ v.currentTime=0; v.play(); }
  refreshControls();
}
function togglePlayAll(){
  if(mode==='all'){ stopPlayback(); return; }
  mode='all'; playEnd=null;
  $('playhead').style.display='block';
  $('readout') && ($('readout').style.display='inline');
  refreshControls();
  seekAndPlay(0);
}
function stopPlayback(){
  mode=null; playEnd=null; try{audio.pause();}catch(e){}
  const ph=$('playhead'); if(ph) ph.style.display='none';
  const r=$('readout'); if(r) r.style.display='none';
  document.querySelectorAll('.pcard').forEach(el=>el.classList.remove('dim'));
  refreshControls();
}
function segIndexAt(t){
  const segs=CUR.segments||[];
  for(let i=0;i<segs.length;i++){ const s=segs[i]; if(s.start!=null&&t>=s.start&&t<s.end) return i; }
  // si pasó el último con sync, quedate en el último sync
  let last=0; for(let i=0;i<segs.length;i++) if(segs[i].start!=null) last=i;
  return last;
}
function onTimeUpdate(){
  const t=audio.currentTime;
  // corte por tramo: vale para timeline Y caps veo (Option A no tiene segments).
  if(mode==='seg'){
    if(playEnd!=null && t>=playEnd){ stopPlayback(); return; }
  }
  if(!CUR||!CUR.segments) return;   // el resto (playhead/all) es solo del timeline
  const total=CUR.total||1;
  if(mode==='all'){
    const i=segIndexAt(t); if(i!==activeIdx) setActive(i);
    const clk=$('clk'); if(clk) clk.textContent=fmt(t);
  }
  updatePlayhead(t/total);
}
function updatePlayhead(frac){
  const ph=$('playhead'); if(!ph) return;
  ph.style.left=Math.max(0,Math.min(1,frac))*100+'%';
}

// hover tooltip
function showTip(i){
  const s=CUR.segments[i]; if(!s) return;
  const tip=$('tip'); const total=CUR.total||1;
  const mid = s.start!=null ? ((s.start+s.end)/2/total)*100 : ((i+0.5)/CUR.segments.length)*100;
  tip.style.left=mid+'%'; tip.style.display='block';
  const h=s.is_clip?CLIP_HEAT:heat(s.dur);
  $('tipImg').src = s.is_clip ? '' : imgSrc(i);
  $('tipImg').style.visibility = s.is_clip ? 'hidden':'visible';
  $('tipAnchor').textContent = s.anchor||(s.is_clip?'Clip de video':'(sin anchor)');
  $('tipDot').style.background=h.solid;
  $('tipTime').textContent = s.start!=null?(fmt(s.start)+'–'+fmt(s.end)+' · '+s.dur+'s'):'clip · sin sync';
}
function hideTip(){ const t=$('tip'); if(t) t.style.display='none'; }

function fixbar(){
  return `<div class="fixbar">
    <span class="hint">✎ pedir fix → en cada foto (regenera solo esa imagen) · corregir narración/audio (Zona 2) → v2</span>
  </div>`;
}

/* ════════ ZONA 1 — FIX DE FOTO ════════ */
function toggleFixPanel(i){
  const p=$('fixpanel-'+i); if(!p) return;
  const open = p.style.display!=='none';
  document.querySelectorAll('.fixpanel').forEach(el=>{ if(el!==p) el.style.display='none'; });
  p.style.display = open ? 'none' : 'block';
  if(!open){ const t=$('fixtext-'+i); if(t) t.focus(); }
}
function closeFixPanel(i){ const p=$('fixpanel-'+i); if(p) p.style.display='none'; }

// ÍTEM 2: recarga reforzada — tarjeta + preview (si muestra i) con &t= nuevo + flash visible.
function reloadImage(i){
  FIXBUST[i]=Date.now();
  const src=imgSrc(i);
  const cardImg=document.querySelector('.pcard[data-i="'+i+'"] .pimg img');
  if(cardImg) cardImg.src=src;
  if(previewIdx===i){ const pv=document.querySelector('#pvMedia img'); if(pv) pv.src=src; }
  flashUpdated('.pcard[data-i="'+i+'"] .pimg');
}
function flashUpdated(sel){
  const host=document.querySelector(sel); if(!host) return;
  const f=document.createElement('div'); f.className='flash'; f.innerHTML='<span>✓ actualizada</span>';
  host.appendChild(f); setTimeout(()=>f.remove(),1500);
}
// Recarga del <video> del clip (tarjeta + preview) tras un fix de clip.
function reloadClip(i){
  const s=CUR&&CUR.segments?CUR.segments[i]:null; if(!s||!s.clip_url) return;
  const t=Date.now();
  const cv=document.querySelector('.pcard[data-i="'+i+'"] .pimg video');
  if(cv){ cv.src=s.clip_url+'&t='+t; cv.load(); }
  if(previewIdx===i){ const pv=$('pvVideo'); if(pv){ pv.src=s.clip_url+'&t='+t; pv.load(); } }
  flashUpdated('.pcard[data-i="'+i+'"] .pimg');
}

// ── lightbox (ÍTEM 1) ──
function openLightbox(src){
  if(!src) return;
  $('lightboxImg').src=src; $('lightbox').classList.add('show');
}
function closeLightbox(){ $('lightbox').classList.remove('show'); $('lightboxImg').src=''; }
$('lightbox').onclick=closeLightbox;
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLightbox(); });
// delegación: doble-click en cualquier <img> de foto (tarjeta, preview, galería) → agranda.
document.addEventListener('dblclick', e=>{
  const img=e.target.closest('.pcard .pimg img, #pvMedia img, .galitem img');
  if(img && img.tagName==='IMG'){ openLightbox(img.src); }
});

// Core genérico (lo usan tarjetas timeline y galería Option A). onReload() corre al ok.
function startFix(cap, img_name, feedback, st, btn, onReload){
  if(!feedback){ st.className='fixstatus err'; st.textContent='describí el cambio'; return; }
  if(btn) btn.disabled=true; st.className='fixstatus work'; st.textContent='enviando…';
  fetch('/fix_image',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cap, img_name, feedback})})
   .then(async r=>{
      if(r.status===409){ throw new Error('ya hay un fix en curso'); }
      if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||r.statusText); }
      st.textContent='regenerando… (~15-40s)';
      if(fixPoll) clearInterval(fixPoll);
      fixPoll=setInterval(()=>pollFix(img_name, st, btn, onReload), 1500);
   })
   .catch(e=>{ st.className='fixstatus err'; st.textContent='⚠ '+e.message; if(btn) btn.disabled=false; });
}
function pollFix(img_name, st, btn, onReload){
  fetch('/fix_status').then(r=>r.json()).then(s=>{
    if(!document.body.contains(st)){ if(fixPoll){clearInterval(fixPoll);fixPoll=null;} return; } // cambió de cap
    if(!s.running && s.done && s.img_name===img_name){
      clearInterval(fixPoll); fixPoll=null; if(btn) btn.disabled=false;
      if(s.ok){ st.className='fixstatus ok'; st.textContent='✅ lista'; onReload(); toast('Imagen regenerada · solo esta foto'); }
      else { st.className='fixstatus err'; st.textContent='⚠ '+(s.reason||'falló'); }
    }
  }).catch(()=>{});
}
// Tarjeta timeline.
function submitFix(cap, img_name, i){
  const ta=$('fixtext-'+i);
  startFix(cap, img_name, (ta?ta.value:'').trim(), $('fixstatus-'+i), $('fixbtn-'+i), ()=>reloadImage(i));
}

// ── fix de CLIP (Zona 1.5) — reescribe el video_prompt, regenera con Veo ──
function startClipFix(cap, feedback, st, btn, onReload){
  if(!feedback){ st.className='fixstatus err'; st.textContent='describí el cambio de movimiento'; return; }
  if(btn) btn.disabled=true; st.className='fixstatus work'; st.textContent='enviando…';
  fetch('/fix_clip',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cap, feedback})})
   .then(async r=>{
      if(r.status===409){ throw new Error('ya hay un regen en curso'); }
      const j=await r.json().catch(()=>({}));
      if(!r.ok){ throw new Error(j.error||r.statusText); }
      const mk=j.marker || (cap+'_clip_01.mp4');
      st.textContent='regenerando clip… (Veo, puede tardar)';
      if(fixPoll) clearInterval(fixPoll);
      fixPoll=setInterval(()=>pollFix(mk, st, btn, onReload), 2500);  // Veo es lento
   })
   .catch(e=>{ st.className='fixstatus err'; st.textContent='⚠ '+e.message; if(btn) btn.disabled=false; });
}
function submitClipFix(cap, i){
  const ta=$('fixtext-'+i);
  startClipFix(cap, (ta?ta.value:'').trim(), $('fixstatus-'+i), $('fixbtn-'+i), ()=>reloadClip(i));
}

// ── Zona 2: fix de pronunciación/audio (re-TTS del cap) ──
function submitNarrFix(cap){
  const ta=$('narrText'), st=$('narrStatus'), btn=$('narrSubmit');
  const fb=(ta?ta.value:'').trim();
  if(!fb){ st.className='fixstatus err'; st.textContent='describí la mala pronunciación'; return; }
  if(btn) btn.disabled=true; st.className='fixstatus work'; st.textContent='enviando…';
  fetch('/fix_narration',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cap, feedback:fb})})
   .then(async r=>{
      if(r.status===409){ throw new Error('ya hay un regen en curso'); }
      const j=await r.json().catch(()=>({}));
      if(!r.ok){ throw new Error(j.error||r.statusText); }
      const mk=j.marker || (cap+'_audio');
      st.textContent='re-generando audio… (TTS + alineación, puede tardar)';
      if(fixPoll) clearInterval(fixPoll);
      fixPoll=setInterval(()=>pollNarr(mk, cap, st, btn), 2500);
   })
   .catch(e=>{ st.className='fixstatus err'; st.textContent='⚠ '+e.message; if(btn) btn.disabled=false; });
}
function pollNarr(marker, cap, st, btn){
  fetch('/fix_status').then(r=>r.json()).then(s=>{
    if(!document.body.contains(st)){ if(fixPoll){clearInterval(fixPoll);fixPoll=null;} return; }
    if(!s.running && s.done && s.img_name===marker){
      clearInterval(fixPoll); fixPoll=null; if(btn) btn.disabled=false;
      if(s.ok){
        st.className='fixstatus ok'; st.textContent='✅ audio actualizado';
        toast('Audio actualizado · '+cap);
        if(curCap===cap){ audioBust=Date.now(); selectCap(cap); }  // re-fetch: spans nuevos + audio &t=
      } else { st.className='fixstatus err'; st.textContent='⚠ '+(s.reason||'falló'); }
    }
  }).catch(()=>{});
}

/* ════════ ENSAMBLAR ════════ */
let asmPoll=null;
$('asmBtn').onclick=async()=>{
  if(!confirm('Lanzar ENSAMBLE (fase2b)? Gasta tiempo de render.')) return;
  const btn=$('asmBtn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>&nbsp;&nbsp;ensamblando…';
  $('asmSub').textContent='lanzando…'; $('asmLog').classList.add('show'); $('asmLog').textContent='';
  try{
    const r=await fetch('/assemble',{method:'POST'});
    if(r.status===409){ $('asmSub').textContent='ya hay un ensamble en curso'; resetAsmBtn(); return; }
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||r.statusText); }
    $('asmSub').textContent='ensamblando… (mirá el log)';
    asmPoll=setInterval(pollAssemble,1500);
  }catch(e){ $('asmSub').textContent='error: '+e.message; resetAsmBtn(); }
};
function resetAsmBtn(){ const b=$('asmBtn'); b.disabled=false; b.innerHTML='<span style="font-size:13px">▶</span>&nbsp;&nbsp;ENSAMBLAR VIDEO'; }
async function pollAssemble(){
  try{
    const s=await (await fetch('/assemble_status')).json();
    $('asmLog').textContent=(s.log_tail||[]).join('\n'); $('asmLog').scrollTop=$('asmLog').scrollHeight;
    if(!s.running&&s.returncode!=null){
      clearInterval(asmPoll); asmPoll=null;
      const ok=s.returncode===0;
      $('asmSub').textContent = ok?'✅ listo para packaging':`❌ ensamble falló (cód ${s.returncode})`;
      toast(ok?'Ensamble OK · listo para packaging':'El ensamble falló — mirá el log');
      resetAsmBtn();
    }
  }catch(e){/* reintenta */}
}
function toast(msg){ const t=$('toast'); t.innerHTML=`<div class="toast">✓ ${esc(msg)}</div>`; setTimeout(()=>t.innerHTML='',3200); }

boot();
</script>
