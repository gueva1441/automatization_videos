<!DOCTYPE html>
<!--
  qa_form.html — HOST del form asistido (contrato chat 61). Lanza run_pipeline --research
  (via /form_launch), muestra barra de progreso (polling /form_state), y cuando llega un
  marcador @@QAFORM@@ embebe el HTML de Design en un iframe (choice/multi/seed_pick), define
  window.qaFormAnswer ahí y rutea la respuesta a stdin (/form_answer). CC = cableado; la
  estética del diálogo es de Design (qa_seed_pick.html, servido por /form_menu). Wizard de
  botones: sin consola ni barra de stdin — solo barra de progreso + diálogos.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Producción asistida — QA Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ color-scheme:dark; --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif; }
  *{box-sizing:border-box;}
  body{margin:0;background:#0f0f12;color:#e8e8ec;font-family:var(--disp);}
  .wrap{max-width:1040px;margin:0 auto;padding:26px 24px 60px;}
  .top{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:#5e5e68;}
  h1{font-size:24px;font-weight:600;color:#f4f4f6;margin:6px 0 0;}
  .btn{font-family:var(--disp);font-weight:700;font-size:15px;color:#06140a;background:#2ea043;border:none;
    padding:12px 24px;border-radius:11px;cursor:pointer;box-shadow:0 8px 26px rgba(46,160,67,.35);}
  .btn:hover:not(:disabled){filter:brightness(1.06);} .btn:disabled{opacity:.5;cursor:not-allowed;}

  .prog{display:flex;gap:8px;margin:22px 0 16px;}
  .seg{flex:1;height:8px;border-radius:5px;background:#1a1a20;border:1px solid #26262f;overflow:hidden;position:relative;}
  .seg.done{background:linear-gradient(90deg,#2ea043,#3fbf57);border-color:#2ea043;}
  .seg.cur{background:#1a1a20;border-color:#2ea043;}
  .seg.cur::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(46,160,67,.5),transparent);
    animation:sh 1.1s linear infinite;}
  @keyframes sh{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
  .proglabels{display:flex;gap:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:#5e5e68;margin-bottom:18px;}
  .proglabels span{flex:1;text-align:center;}
  .proglabels span.on{color:#86e29a;}

  /* Actividad viva: última línea útil del pipeline (paso/script en curso). Siempre muestra algo
     si el proceso está vivo → mata la sensación de "se quedó pegado" en RESEARCH/ASSETS. */
  #activity{display:none;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;
    color:#9a9aa2;background:#0c0c0f;border:1px solid #1c1c22;border-radius:9px;padding:9px 13px;
    margin-bottom:12px;min-width:0;}
  #activity .gear{flex:none;color:#2ea043;display:inline-block;animation:spin 2.4s linear infinite;}
  #activity .txt{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .state{font-family:var(--mono);font-size:12px;color:#8a8a92;min-height:16px;margin-bottom:10px;}
  .state .ok{color:#2ea043;} .state .err{color:#e5484d;} .state .run{color:#d8a02a;}

  /* Franja de error: solo visible en fallo (returncode != 0). Una línea, nunca la consola entera. */
  #errstrip{display:none;font-family:var(--mono);font-size:11.5px;line-height:1.5;color:#f1a3a6;
    background:rgba(229,72,77,.10);border:1px solid rgba(229,72,77,.45);border-left:3px solid #e5484d;
    border-radius:8px;padding:9px 13px;margin-bottom:14px;white-space:pre-wrap;word-break:break-word;}
  #errstrip .code{color:#e5484d;font-weight:700;}

  /* Banner de GATE (juez / visor): freno ámbar con botón(es). La barra corre sola y solo
     se planta acá donde una decisión de Omar cambia algo (plata o calidad). */
  #gate{display:none;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    background:rgba(216,160,42,.09);border:1px solid rgba(216,160,42,.5);border-left:3px solid #d8a02a;
    border-radius:12px;padding:15px 18px;margin-bottom:14px;}
  #gate .gmsg{font-family:var(--disp);font-size:15px;color:#f0e2c0;min-width:0;}
  #gate .gmsg .tag{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:#d8a02a;display:block;margin-bottom:4px;}
  #gate .gbtns{display:flex;gap:10px;flex-wrap:wrap;flex:none;}
  #gate .gbtn{font-family:var(--disp);font-weight:700;font-size:14px;color:#06140a;background:#2ea043;border:none;
    padding:11px 20px;border-radius:10px;cursor:pointer;box-shadow:0 8px 22px rgba(46,160,67,.3);}
  #gate .gbtn:hover{filter:brightness(1.06);}
  #gate .gbtn.amber{color:#1c1402;background:#d8a02a;box-shadow:0 8px 22px rgba(216,160,42,.3);}
  #gate .gbtn.ghost{color:#e8e8ec;background:#222229;border:1px solid #34343c;box-shadow:none;}
  /* Con un gate activo, el segmento actual de la barra late en ámbar en vez de verde. */
  .prog.paused .seg.cur{border-color:#d8a02a;}
  .prog.paused .seg.cur::after{background:linear-gradient(90deg,transparent,rgba(216,160,42,.5),transparent);}

  #placeholder{background:#08080b;border:1px solid #222229;border-radius:12px;padding:22px 18px;}
  #dialog{display:none;border:1px solid #222229;border-radius:12px;overflow:hidden;background:#0f0f12;}
  #dialog iframe{width:100%;height:78vh;border:0;display:block;background:#0f0f12;}
  .empty{font-family:var(--mono);font-size:12.5px;color:#5e5e68;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="eyebrow">QA STUDIO · PRODUCCIÓN ASISTIDA</div>
      <h1>Producir un tema (research → guion → assets → video)</h1>
    </div>
    <button class="btn" id="launchBtn">↻ Reiniciar corrida</button>
  </div>

  <div class="prog" id="prog"></div>
  <div class="proglabels" id="progLabels"></div>

  <div id="activity"><span class="gear">⚙</span><span class="txt"></span></div>

  <div class="state" id="state"></div>
  <div id="errstrip"></div>
  <div id="gate"></div>

  <div id="dialog"></div>
  <div id="placeholder"><span class="empty">Arrancando la corrida… cuando el pipeline necesite una decisión, se abre el diálogo acá.</span></div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
let pollTimer=null, curMarkerKey=null;
// PUENTE (HANDOFF 62c): el gate reuse_seeds (pre-juez) elige por identidad; cuando llega
// seed_pick (post-juez, con verdict) el host matchea y auto-responde / confirma.
let pickedSeedTitle=null;      // título del seed elegido en la galería (identidad, NO índice)
let pendingSeedMarker=null;    // marcador seed_pick guardado, por si hay que "elegir otro"
// GATES (HANDOFF 63a): juez (freno condicional) y visor (freno obligado). El marcador no
// abre diálogo de una: planta un banner ámbar con botón(es); el diálogo del juez se abre al click.
let gateMarker=null;           // marcador del gate activo (judge_action / visor_gate)

function renderProgress(phase, phases){
  const prog=$('prog'), labels=$('progLabels');
  if(prog.children.length!==phases.length){
    prog.innerHTML=''; labels.innerHTML='';
    phases.forEach(p=>{ const s=document.createElement('div'); s.className='seg'; prog.appendChild(s);
      const l=document.createElement('span'); l.textContent=p; labels.appendChild(l); });
  }
  const idx=phase?phases.indexOf(phase):-1;
  [...prog.children].forEach((s,i)=>{ s.className='seg'+(i<idx?' done':(i===idx?' cur':'')); });
  [...labels.children].forEach((l,i)=>{ l.className=(i<=idx&&idx>=0)?'on':''; });
}
function renderState(s){
  const el=$('state'); const b=$('launchBtn');
  if(s.running){ el.innerHTML='<span class="run">● corriendo</span> '+(s.phase?('· fase '+s.phase):''); b.disabled=true; b.textContent='● corriendo…'; }
  else if(s.returncode!=null){
    const ok=s.returncode===0;
    el.innerHTML = ok?'<span class="ok">✓ pipeline terminó OK</span>':('<span class="err">✗ pipeline terminó (código '+s.returncode+')</span>');
    b.disabled=false; b.textContent='↻ Reiniciar corrida';
  } else { el.textContent=''; b.disabled=false; b.textContent='↻ Reiniciar corrida'; }
  renderErr(s);
}

// ITEM 3 — franja de error: SOLO en fallo (returncode != 0). Una línea = última de console_tail.
function renderErr(s){
  const e=$('errstrip');
  if(s.returncode!=null && s.returncode!==0){
    const tail=s.console_tail||[];
    const last=tail.length?String(tail[tail.length-1]).trim():'';
    e.innerHTML='<span class="code">✗ código '+s.returncode+'</span>'+(last?(' · '+esc(last)):'');
    e.style.display='block';
  } else { e.style.display='none'; e.textContent=''; }
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ② Actividad viva: última línea NO vacía de console_tail (sin separadores ═══/───). Solo
// mientras corre → la zona siempre muestra movimiento si el proceso está vivo.
const ACT_SEP=/^[\s═─=_·•.\-–—]+$/;
function lastLiveLine(lines){
  if(!lines || !lines.length) return '';
  for(let i=lines.length-1;i>=0;i--){
    const t=String(lines[i]==null?'':lines[i]).trim();
    if(t && !ACT_SEP.test(t)) return t;
  }
  return '';
}
function renderActivity(s){
  const a=$('activity');
  if(s.running){
    a.querySelector('.txt').textContent = lastLiveLine(s.console_tail) || 'trabajando…';
    a.style.display='flex';
  }else{ a.style.display='none'; }
}

function markerKey(m){
  try{
    if(m.accept==='key')  return m.menu+'|key|'+(m.options||[]).map(o=>o.key).join(',');
    if(m.accept==='keys') return m.menu+'|keys|'+(m.options||[]).map(o=>o.key).join(',');
    return m.menu+'|'+((m.payload&&m.payload.seeds)||[]).map(x=>x.idx).join(',');
  }catch(e){ return m.menu; }
}
function handleMarker(m){
  if(m){
    const k=markerKey(m);
    if(k!==curMarkerKey){
      curMarkerKey=k;
      // Si elegimos un seed en la galería, el seed_pick post-juez lo resuelve el puente
      // (auto-producir si es oro · confirm si es dudoso/descartar). Si no, diálogo normal.
      if(m.menu==='seed_pick' && pickedSeedTitle!=null){ bridgeSeedPick(m); }
      // Gates: NO abren diálogo de una → plantan el banner ámbar con botón(es).
      else if(m.menu==='judge_action' || m.menu==='visor_gate' || m.menu==='remeasure_pick'){ showGate(m); }
      else showDialog(m);
    }
  } else if(curMarkerKey!==null){ curMarkerKey=null; hideDialog(); hideGate(); }
}
function showDialog(marker){
  $('placeholder').style.display='none';
  const area=$('dialog'); area.style.display='block'; area.innerHTML='';
  const isGallery = marker.menu==='reuse_seeds';  // aterrizaje pickeable (galería de seeds)
  const isJudge   = marker.menu==='judge_action'; // form del juez (lista de issues + V/A/R/S)
  const isChoice  = marker.accept==='key';        // diálogo genérico de botones
  const isMulti   = marker.accept==='keys';       // diálogo de checkboxes (multi-select)
  const menuFile = isGallery ? '__gallery__' : (isJudge ? '__judge__' : (isChoice ? '__choice__' : (isMulti ? '__multi__' : marker.menu)));
  const ifr=document.createElement('iframe');
  ifr.src='/form_menu?menu='+encodeURIComponent(menuFile);
  ifr.onload=()=>{
    try{
      ifr.contentWindow.qaFormAnswer=(payload)=>onAnswer(payload);
      if(isGallery && typeof ifr.contentWindow.renderGallery==='function'){
        ifr.contentWindow.renderGallery(marker);
      }else if(isJudge && typeof ifr.contentWindow.renderJudge==='function'){
        ifr.contentWindow.renderJudge(marker);
      }else if(isChoice && typeof ifr.contentWindow.renderChoice==='function'){
        ifr.contentWindow.renderChoice(marker);
      }else if(isMulti && typeof ifr.contentWindow.renderMulti==='function'){
        ifr.contentWindow.renderMulti(marker);
      }else if(typeof ifr.contentWindow.renderSeeds==='function'){
        ifr.contentWindow.renderSeeds((marker.payload&&marker.payload.seeds)||[]);
      }
    }catch(e){ console.error('dialog wiring', e); }
  };
  area.appendChild(ifr);
}
function hideDialog(){ const a=$('dialog'); a.style.display='none'; a.innerHTML=''; if($('gate').style.display!=='flex') $('placeholder').style.display='block'; }

// ── GATES (juez / visor): banner ámbar que frena la barra hasta una decisión de Omar ──
function setPaused(on){ $('prog').classList.toggle('paused', !!on); }
function showGate(m){
  gateMarker=m;
  const d=$('dialog'); d.style.display='none'; d.innerHTML='';
  $('placeholder').style.display='none';
  setPaused(true);
  const g=$('gate'); g.style.display='flex'; g.innerHTML='';
  const msg=document.createElement('div'); msg.className='gmsg';
  const btns=document.createElement('div'); btns.className='gbtns';
  if(m.menu==='judge_action'){
    const n=((m.payload&&m.payload.issues)||[]).length;
    msg.innerHTML='<span class="tag">⚖ GATE · JUEZ</span>'+esc(m.prompt||('El juez marcó '+n+' issue(s)'));
    const b=document.createElement('button'); b.className='gbtn amber';
    b.textContent='Abrir juez · '+n+' issue'+(n===1?'':'s');
    b.onclick=openGateDialog;
    btns.appendChild(b);
  }else if(m.menu==='visor_gate'){
    msg.innerHTML='<span class="tag">👁 GATE · VISOR</span>'+esc(m.prompt||'Revisá el video en el visor antes de hornear');
    const open=document.createElement('button'); open.className='gbtn ghost';
    // cache-buster: URL nueva en cada click → imposible ver el topic viejo cacheado.
    open.textContent='Abrir visor'; open.onclick=()=>{ window.open('/?t='+Date.now(),'_blank'); };
    const cont=document.createElement('button'); cont.className='gbtn';
    cont.textContent='Continuar → hornear video'; cont.onclick=visorContinue;
    btns.appendChild(open); btns.appendChild(cont);
  }else if(m.menu==='remeasure_pick'){
    const wl=(m.payload&&m.payload.worst_label)||'?';
    msg.innerHTML='<span class="tag">⚠ GATE · RE-MEDIR</span>'+esc(m.prompt||'El pick flipeó al re-medir');
    const b=document.createElement('button'); b.className='gbtn amber';
    b.textContent='Resolver pick · '+wl;
    b.onclick=openGateDialog;
    btns.appendChild(b);
  }
  g.appendChild(msg); g.appendChild(btns);
}
function hideGate(){ const g=$('gate'); g.style.display='none'; g.innerHTML=''; gateMarker=null; setPaused(false);
  if($('dialog').style.display!=='block') $('placeholder').style.display='block'; }
// "Abrir juez" → abre el form del juez (issues + V/A/R/S). El banner se oculta; al responder se cierra todo.
function openGateDialog(){ $('gate').style.display='none'; setPaused(false); if(gateMarker) showDialog(gateMarker); }
// "Continuar → hornear" del visor: manda "C" por stdin → run_pipeline desbloquea el input() → fase2b.
function visorContinue(){ postLine('C').then(()=>{ curMarkerKey=null; hideGate(); }); }

function postLine(line){
  return fetch('/form_answer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line})})
    .then(r=>r.json()).catch(()=>({error:'net'}));
}

// §4: traduce la respuesta del HTML de Design a una línea de stdin.
function onAnswer(payload){
  // PUENTE — click en una tarjeta de la galería reuse_seeds: recordá la identidad (título)
  // y mandá "S" (NO el título: el input del gate parsea S/n). El seed_pick post-juez lo resuelve.
  if(payload && payload.action==='pick_seed'){
    pickedSeedTitle = payload.value;
    postLine('S').then(()=>{ curMarkerKey=null; hideDialog(); });
    return;
  }
  // Confirm del juez (diálogo host-sintético): "Elegir otro" → panel rico seed_pick;
  // cualquier otro value es el idx → producir igual.
  if(payload && payload.menu==='judge_confirm'){
    if(payload.value==='__other__'){
      if(pendingSeedMarker) showDialog(pendingSeedMarker);   // pick manual; curMarkerKey sigue en seed_pick
      return;
    }
    postLine(String(payload.value)).then(()=>{ curMarkerKey=null; hideDialog(); });
    return;
  }
  let line;
  if(!payload || payload.action==='cancel') line='Q';
  else if(Array.isArray(payload.value)) line=payload.value.join(',');
  else line=String(payload.value);
  postLine(line).then(()=>{ curMarkerKey=null; hideDialog(); });
}

// PUENTE post-juez: matchea por IDENTIDAD (título) el seed elegido pre-juez contra el
// payload de seed_pick (que ya trae verdict/reason) y decide. NO usa índices (el orden
// cambia tras el juez). Si no matchea (ej. vino por discovery) → panel rico normal.
function bridgeSeedPick(marker){
  const seeds=(marker.payload&&marker.payload.seeds)||[];
  const want=pickedSeedTitle;
  pickedSeedTitle=null;            // se consume (cualquiera sea el resultado)
  pendingSeedMarker=marker;        // por si el confirm ofrece "elegir otro"
  const match=seeds.find(s=>s && s.title===want);
  if(!match){ showDialog(marker); return; }       // no matcheó → panel rico normal
  if(match.verdict==='oro'){
    postLine(String(match.idx)).then(()=>{ curMarkerKey=null; hideDialog(); });   // oro → auto-producir, sin diálogo
    return;
  }
  showJudgeConfirm(match);         // dudoso/descartar → confirm del juez (no auto)
}

// Confirm host-sintético (reusa qa_choice.html vía showDialog): muestra verdict + reason
// y dos acciones. El idx va como `key` de "Producir igual" → onAnswer lo manda a stdin.
function showJudgeConfirm(match){
  const verd=String(match.verdict||'—').toUpperCase();
  const reason=String(match.reason||'').trim();
  showDialog({
    menu:'judge_confirm', accept:'key',
    prompt:'El juez marcó este tema como “'+verd+'”',
    body: reason ? ('Motivo del juez:\n'+reason) : 'El juez no dejó un motivo.',
    options:[{key:String(match.idx), label:'▶ Producir igual'},
             {key:'__other__', label:'Elegir otro tema'}],
    default:String(match.idx),
  });
}

async function poll(){
  try{
    const s=await (await fetch('/form_state')).json();
    renderProgress(s.phase, s.phases||[]);
    renderState(s);
    renderActivity(s);
    handleMarker(s.marker);
  }catch(e){ /* reintenta */ }
}
function startPolling(){ if(pollTimer) clearInterval(pollTimer); poll(); pollTimer=setInterval(poll,1000); }

async function launch(){
  $('launchBtn').disabled=true;
  $('errstrip').style.display='none';
  try{
    const r=await fetch('/form_launch',{method:'POST'});
    if(r.status===409){ $('state').innerHTML='<span class="run">● ya hay una corrida en curso</span>'; }
    else if(!r.ok){ const e=await r.json().catch(()=>({})); $('state').innerHTML='<span class="err">✗ '+(e.error||'no pude lanzar')+'</span>'; }
  }catch(e){ $('state').innerHTML='<span class="err">✗ '+e.message+'</span>'; }
  startPolling();
}
$('launchBtn').onclick=launch;   // vía manual de reiniciar (el server da 409 si ya hay corrida)

// ITEM 1 — auto-run al abrir: si está fresco (nada corriendo y sin returncode) → lanzar solo,
// sin click. El run frena en el primer diálogo esperando input → $0 de gasto hasta que Omar
// elige. Si ya hay corrida (refresh a mitad) → NO relanzar, solo enganchar el polling.
(async function init(){
  try{
    const s=await (await fetch('/form_state')).json();
    if(!s.running && s.returncode==null){ await launch(); return; }
  }catch(e){ /* si /form_state falla, igual enganchamos polling abajo */ }
  startPolling();
})();
</script>
</body>
</html>
