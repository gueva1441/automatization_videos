<!DOCTYPE html>
<!--
  qa_gallery.html — aterrizaje PICKEABLE de seeds pendientes (menú reuse_seeds, contrato chat 61).
  Embebido en un iframe (~78vh) por el host (qa_form.html); el host define window.qaFormAnswer
  y llama window.renderGallery(marker) con {menu, accept, prompt, options[], default, payload.seeds[]}.

  Layout: HEADER FIJO (eyebrow + prompt + botón «+ Generar nuevos seeds») que NO scrollea,
  y una GALERÍA scrollable (flex:1) con una TARJETA CLICKEABLE por seed.

  SEAM (lockeado):
    - click tarjeta → qaFormAnswer({ menu:'reuse_seeds', action:'pick_seed', value:<title> })
    - click «+ Generar» → qaFormAnswer({ menu:'reuse_seeds', action:'choose', value:'n' })

  Paleta EXACTA copiada de qa_seed_pick.html / qa_choice.html (Claude Design) — NO inventar colores.
-->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seeds pendientes — elegí uno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; background: #0f0f12; color: #e8e8ec; font-family: 'Space Grotesk', sans-serif;
         height: 100vh; display: flex; flex-direction: column; }

  /* HEADER FIJO (no scrollea) */
  .head { flex: none; padding: 30px 28px 20px; border-bottom: 1px solid #1f1f26;
          background: #0f0f12; }
  .head-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: flex-end;
                justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .head-left { min-width: 0; }
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .2em; color: #5e5e68; }
  .prompt { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600; color: #f4f4f6;
            margin: 11px 0 0; letter-spacing: -.01em; line-height: 1.2; }

  .gen { flex: none; display: inline-flex; align-items: center; gap: 9px;
         font-family: 'Space Grotesk', sans-serif; font-size: 14.5px; font-weight: 600; color: #f0f0f3;
         background: #222229; border: 1px solid #34343c; border-radius: 11px; padding: 12px 20px;
         cursor: pointer; transition: background .12s, border-color .12s, transform .08s; }
  .gen:hover { border-color: #2ea043; background: #1d1d24; }
  .gen:active { transform: scale(.99); }
  .gen .plus { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: #2ea043; }

  /* GALERÍA scrollable */
  .scroll { flex: 1; overflow: auto; padding: 22px 28px 40px; }
  .gallery { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 11px; }
  #list { display: flex; flex-direction: column; gap: 11px; }
  .cap { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .14em;
         color: #5e5e68; margin: 2px 0 4px; }

  /* TARJETA clickeable por seed */
  .seed { position: relative; display: block; width: 100%; text-align: left; cursor: pointer;
          background: #16161b; border: 1px solid #262630; border-radius: 12px; padding: 16px 20px;
          color: #e8e8ec; font-family: 'Space Grotesk', sans-serif;
          transition: background .12s, border-color .12s, transform .08s; }
  .seed:hover { border-color: #2ea043; background: #1d1d24; }
  .seed:active { transform: scale(.995); }

  /* HANDOFF 64e — ✕ por tarjeta: borra (archiva, recuperable). VISIBLE sin hover; full rojo al hover. */
  .del { position: absolute; top: 11px; right: 13px; z-index: 2; width: 24px; height: 24px;
         display: flex; align-items: center; justify-content: center;
         font-family: 'Space Grotesk', sans-serif; font-size: 14px; line-height: 1;
         color: #d98a8a; background: #2a1518; border: 1px solid #4a2329; border-radius: 7px;
         cursor: pointer; opacity: .85; transition: opacity .12s, color .12s, background .12s, border-color .12s; }
  .del:hover { opacity: 1; color: #fff; background: #e5484d; border-color: #e5484d; }

  .seed-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding-right: 34px; }
  .ttl { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; color: #f4f4f6;
         letter-spacing: -.01em; line-height: 1.3; min-width: 0; }

  .badges { flex: none; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { display: inline-flex; align-items: center; gap: 6px;
           font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
           letter-spacing: .03em; color: #b6b6be; background: #222229;
           border: 1px solid #34343c; border-radius: 999px; padding: 5px 11px; white-space: nowrap; }
  .badge.comp { font-weight: 700; letter-spacing: .04em; }
  .comp-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .signal { display: flex; align-items: center; gap: 16px; margin-top: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #6e6e78; }
  .signal .met { display: inline-flex; align-items: baseline; gap: 6px; }
  .signal .met .k { color: #54545e; letter-spacing: .08em; font-size: 10px; }
  .signal .met .v { color: #b6b6be; font-weight: 500; }

  .empty { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #6e6e78;
           background: #16161b; border: 1px dashed #2a2a32; border-radius: 12px; padding: 22px; text-align: center; }
</style>
</head>
<body>

  <div class="head">
    <div class="head-inner">
      <div class="head-left">
        <div class="eyebrow">SEEDS PENDIENTES</div>
        <div class="prompt" id="prompt">…</div>
      </div>
      <button class="gen" id="genBtn"><span class="plus">+</span><span id="genLabel">Generar nuevos seeds</span></button>
    </div>
  </div>

  <div class="scroll">
    <div class="gallery">
      <div class="cap" id="cap"></div>
      <div id="list"></div>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // PUNTO DE ENTRADA: el host llama window.renderGallery(marker).
  //   marker = { menu, accept, prompt, options[], default, payload.seeds[] }
  //   seed = { title, mode, es_label, en_views, en_ratio }  (en_views/en_ratio crudos)
  var SAMPLE = {
    menu: 'reuse_seeds',
    accept: 'key',
    prompt: 'Tenés 4 seed(s) pendientes — elegí uno',
    options: [ { key: 'S', label: 'Usar estos seeds' }, { key: 'n', label: '+ Generar nuevos seeds' } ],
    default: 'S',
    payload: { seeds: [
      { title: 'El hospital psiquiátrico más peligroso de Gran Bretaña', mode: 'spy_arbitrage', es_label: 'VACIO', en_views: 8000000, en_ratio: 200 },
      { title: 'Wittenoom: el Chernóbil secreto de Australia', mode: 'digital_archaeology', es_label: 'HUECO', en_views: 2900000, en_ratio: 16 },
      { title: 'Villa Epecuén: el pueblo que el agua se tragó', mode: 'spy_arbitrage', es_label: 'DISPUTADO', en_views: 16400000, en_ratio: 1.5 },
      { title: 'Kolmanskop: la ciudad minera tragada por el desierto', mode: 'manual', es_label: null, en_views: null, en_ratio: null }
    ] }
  };

  // -- CANAL DE SALIDA (lo define el HOST; NO-OP seguro en preview suelto) --
  function qaAnswer(payload) {
    try {
      if (typeof window.qaFormAnswer === 'function') window.qaFormAnswer(payload);
    } catch (e) { /* no romper el HTML si el host falla */ }
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // -- FORMATO (igual que qa_seed_pick) ------------------------------------
  function fmtViews(n) {
    if (n == null) return '—';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return Math.round(n / 1e3) + 'K';
    return String(n);
  }
  function fmtRatio(n) { if (n == null) return '—'; return (Number.isInteger(n) ? n : Number(n).toFixed(1)) + '×'; }

  // -- BADGE DE NICHO (por mode) — mismo estilo pill que qa_choice ----------
  var MODE_BADGES = {
    spy_arbitrage:       { emoji: '🕵️', label: 'Spy-Arbitrage' },
    digital_archaeology: { emoji: '🏛️', label: 'Arqueología' },
    manual:              { emoji: '✏️', label: 'Manual' }
  };
  function nicheBadge(mode) {
    var m = MODE_BADGES[mode];
    if (m) return '<span class="badge">' + m.emoji + ' ' + esc(m.label) + '</span>';
    var raw = (mode == null || mode === '') ? '—' : mode;
    return '<span class="badge">' + esc(raw) + '</span>';
  }

  // -- BADGE DE COMPETENCIA (por es_label) — mismos colores que qa_seed_pick
  var STATES = {
    VACIO:     { label: 'VACÍO',     color: '#2ea043' },
    HUECO:     { label: 'HUECO',     color: '#d8a02a' },
    DISPUTADO: { label: 'DISPUTADO', color: '#e5484d' },
    SATURADO:  { label: 'SATURADO',  color: '#93233a' }
  };
  function compBadge(label) {
    var st = STATES[label];
    if (!st) return '';  // sin es_label → no se muestra badge
    return '<span class="badge comp" style="color:' + st.color + ';border-color:' + st.color + '40">' +
             '<span class="comp-dot" style="background:' + st.color + '"></span>' + esc(st.label) +
           '</span>';
  }

  // -- SEÑAL VIRAL EN (opcional, discreta) ---------------------------------
  function signalHTML(s) {
    var hasViews = s.en_views != null;
    var hasRatio = s.en_ratio != null;
    if (!hasViews && !hasRatio) return '';
    var out = '<div class="signal">';
    if (hasViews) out += '<span class="met"><span class="k">DEMANDA EN</span><span class="v">' + esc(fmtViews(s.en_views)) + '</span></span>';
    if (hasRatio) out += '<span class="met"><span class="k">RATIO</span><span class="v">' + esc(fmtRatio(s.en_ratio)) + '</span></span>';
    out += '</div>';
    return out;
  }

  // -- RENDER --------------------------------------------------------------
  function seedHTML(s) {
    s = s || {};
    return '' +
      '<button class="seed" data-title="' + esc(s.title) + '">' +
        '<span class="del" data-del="' + esc(s.idx) + '" title="Borrar (se archiva · recuperable)">✕</span>' +
        '<div class="seed-top">' +
          '<span class="ttl">' + esc(s.title) + '</span>' +
          '<span class="badges">' + compBadge(s.es_label) + nicheBadge(s.mode) + '</span>' +
        '</div>' +
        signalHTML(s) +
      '</button>';
  }

  function renderGallery(marker) {
    marker = marker || {};
    var payload = marker.payload || {};
    var seeds = Array.isArray(payload.seeds) ? payload.seeds : [];

    document.getElementById('prompt').textContent = marker.prompt || 'Elegí un seed';

    // Label del botón «+ Generar»: lo toma de la opción con key==='n'.
    var genLabel = '+ Generar nuevos seeds';
    (marker.options || []).forEach(function (o) {
      if (o && o.key === 'n' && o.label) genLabel = o.label;
    });
    // El '+' ya va aparte como ícono; sacamos un '+ ' inicial del label si viene incluido.
    document.getElementById('genLabel').textContent = String(genLabel).replace(/^\s*\+\s*/, '');

    document.getElementById('cap').textContent = 'SEEDS ENCONTRADOS · ' + seeds.length;

    var list = document.getElementById('list');
    if (!seeds.length) {
      list.innerHTML = '<div class="empty">No hay seeds pendientes. Generá nuevos con el botón de arriba.</div>';
    } else {
      list.innerHTML = seeds.map(seedHTML).join('');
    }
  }

  // -- EVENTOS (delegación; sobreviven al re-render) -----------------------
  // Click en una tarjeta → pick_seed con el TITLE crudo del seed.
  document.getElementById('list').addEventListener('click', function (e) {
    // ✕ → borrar este seed: el host manda "d<idx>" por stdin; fase1 archiva + re-emite la galería.
    var del = e.target.closest('.del');
    if (del) {
      qaAnswer({ menu: 'reuse_seeds', action: 'delete', value: Number(del.getAttribute('data-del')) });
      return;   // NO disparar el pick de la tarjeta
    }
    var card = e.target.closest('.seed');
    if (!card) return;
    qaAnswer({ menu: 'reuse_seeds', action: 'pick_seed', value: card.getAttribute('data-title') });
  });
  // Click en «+ Generar nuevos seeds» → choose 'n'.
  document.getElementById('genBtn').addEventListener('click', function () {
    qaAnswer({ menu: 'reuse_seeds', action: 'choose', value: 'n' });
  });

  // -- API PÚBLICA ---------------------------------------------------------
  window.renderGallery = renderGallery;

  // Arranque con el sample (el host lo reemplaza con renderGallery(markerReal)).
  renderGallery(SAMPLE);
})();
</script>
</body>
</html>
